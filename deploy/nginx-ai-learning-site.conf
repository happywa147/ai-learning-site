server {
    listen 80;
    server_name ai.mynaxis.com;

    location /.well-known/acme-challenge/ {
        root /www/wwwroot/ai.mynaxis.com;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ai.mynaxis.com;

    root /www/wwwroot/ai.mynaxis.com;
    index index.html;

    charset utf-8;

    ssl_certificate /www/server/panel/vhost/cert/ai.mynaxis.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/ai.mynaxis.com/privkey.pem;

    access_log /www/wwwlogs/ai.mynaxis.com.access.log;
    error_log /www/wwwlogs/ai.mynaxis.com.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|json|png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /llms.txt {
        try_files $uri =404;
    }
}
