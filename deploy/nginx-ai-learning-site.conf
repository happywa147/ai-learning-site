server {
    listen 80;
    server_name ai.mynaxis.com;

    root /var/www/mynaxis/ai-learning-site;
    index index.html;

    charset utf-8;

    access_log /var/log/nginx/ai-learning-site.access.log;
    error_log /var/log/nginx/ai-learning-site.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|json|png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /llms.txt {
        try_files $uri =404;
    }
}

